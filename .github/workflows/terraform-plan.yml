name: "Terraform plan"

on:
  workflow_call:
    inputs:
      aws_sts_credentials_json:
        description: "AWS STS credentials (JSON):"
        required: true
        type: string

env:
  TF_LOG: INFO

jobs:
  terraform:
    name: "Terraform plan job"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout the repository to the runner
        uses: actions/checkout@v2

      - name: Extract and mask AWS credentials
        run: |
          RAW_JSON="$(jq -r '.inputs.aws_sts_credentials_json' "$GITHUB_EVENT_PATH")"

          AWS_ACCESS_KEY_ID="$(printf '%s' "$RAW_JSON" | jq -r '.Credentials.AccessKeyId')"
          AWS_SECRET_ACCESS_KEY="$(printf '%s' "$RAW_JSON" | jq -r '.Credentials.SecretAccessKey')"
          AWS_SESSION_TOKEN="$(printf '%s' "$RAW_JSON" | jq -r '.Credentials.SessionToken')"

          echo "::add-mask::$RAW_JSON"
          echo "::add-mask::$AWS_ACCESS_KEY_ID"
          echo "::add-mask::$AWS_SECRET_ACCESS_KEY"
          echo "::add-mask::$AWS_SESSION_TOKEN"

          {
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            echo "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN"
          } >> "$GITHUB_ENV"

      - name: Setup Terraform with specified version on the runner
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.7

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -var-file ./apply-tfvars/dev.tfvars
