name: "Terraform plan"

on:
  workflow_call:
    inputs:
      terraform_version:
        required: true
        type: string
    secrets:
      aws_sts_credentials_json:
        required: true

env:
  TF_LOG: INFO

jobs:
  terraform:
    name: "Terraform plan job"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout the repository to the runner
        uses: actions/checkout@v2

      - name: Mask extracted credentials
        run: |
          echo "::add-mask::${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.AccessKeyId }}"
          echo "::add-mask::${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.SecretAccessKey }}"
          echo "::add-mask::${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.SessionToken }}"

      - name: Set AWS credentials as environment variables
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.AccessKeyId }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.SecretAccessKey }}" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=${{ fromJSON(secrets.aws_sts_credentials_json).Credentials.SessionToken }}" >> "$GITHUB_ENV"

      - name: Setup Terraform with specified version on the runner
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -var-file ./apply-tfvars/dev.tfvars
